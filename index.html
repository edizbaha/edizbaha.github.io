<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gri Geçiş - Ediz Baha</title>
    <!-- Modern Sans-Serif Fontlar -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Pro -->
    <link rel="stylesheet" href="https://cdn.cache.lol/type/fontawesome-pro/css/all.css">
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111827;
            --secondary-text: #6b7280;
            --pill-bg: #f5f5f5;
            --border-color: #f0f0f0;
            --accent-glow: rgba(255, 230, 209, 0.4);
            --card-bg: #ffffff;
            --reader-bg: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --secondary-text: #94a3b8;
            --pill-bg: #1e293b;
            --border-color: #1e293b;
            --accent-glow: rgba(255, 230, 209, 0.1);
            --card-bg: #1e293b;
            --reader-bg: #0f172a;
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: radial-gradient(ellipse at top, var(--accent-glow) 0%, transparent 70%);
            background-attachment: fixed;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 6rem 2rem 5rem;
            animation: fadeIn 0.8s ease;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--pill-bg);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: var(--text-color);
            transition: var(--transition);
            font-size: 1.2rem;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .book-hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .cover-image {
            width: 180px;
            height: 260px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            transition: transform 0.5s ease;
        }

        .cover-image:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -1px;
        }

        .author {
            color: var(--secondary-text);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .description {
            color: var(--secondary-text);
            line-height: 1.7;
            font-size: 1.05rem;
            margin-bottom: 3rem;
        }

        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .chapter-item {
            padding: 1.25rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .chapter-item:hover {
            border-color: var(--secondary-text);
            transform: translateX(4px);
        }

        .chapter-title {
            font-weight: 500;
            font-size: 1.1rem;
        }

        .arrow {
            color: var(--secondary-text);
            font-size: 1rem;
        }

        /* Reader View */
        #readerView {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--reader-bg);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 4rem 2rem;
        }

        #readerView.active {
            display: flex;
        }

        .reader-content {
            max-width: 650px;
            width: 100%;
        }

        .back-btn {
            background: var(--pill-bg);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 3rem;
            font-weight: 500;
            color: var(--text-color);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            opacity: 0.8;
        }

        /* Paragraph Comments Styling */
        .paragraph-container {
            position: relative;
            margin-bottom: 1.5rem;
            padding: 0.5rem 0;
            transition: background-color 0.2s ease;
        }

        .paragraph-text {
            font-size: 1.25rem;
            line-height: 1.9;
            color: var(--text-color);
        }

        .comment-trigger {
            position: absolute;
            right: -40px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--pill-bg);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--secondary-text);
            font-size: 0.9rem;
        }

        .paragraph-container:hover .comment-trigger {
            opacity: 1;
        }

        @media (max-width: 800px) {
            .comment-trigger {
                right: 0px;
                background: rgba(0,0,0,0.05); /* Light mobile indicator */
                opacity: 0.5;
            }
        }

        /* Comment Modal */
        .comment-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70vh;
            background: var(--card-bg);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            z-index: 2000;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .comment-modal.active {
            transform: translateY(0);
        }

        .modal-drag-handle {
            width: 40px;
            height: 4px;
            background: var(--pill-bg);
            border-radius: 2px;
            margin: -0.5rem auto 1.5rem;
        }

        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .username-input {
            background: var(--pill-bg);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: var(--text-color);
            font-size: 0.9rem;
            width: 200px;
        }

        .input-row {
            display: flex;
            gap: 1rem;
        }

        .comment-input {
            flex-grow: 1;
            background: var(--pill-bg);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            color: var(--text-color);
            font-family: inherit;
        }

        .send-btn {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
        }

        .comment-list {
            overflow-y: auto;
            flex-grow: 1;
        }

        .comment-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            animation: fadeIn 0.4s ease;
        }

        .comment-author {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
            display: block;
        }

        .comment-text {
            color: var(--secondary-text);
            line-height: 1.5;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 1500;
            display: none;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container { padding-top: 4rem; }
            h1 { font-size: 2rem; }
            .comment-modal { height: 85vh; }
            .username-input { width: 100%; }
        }
    </style>
</head>
<body data-theme="light">

    <button class="theme-toggle" id="themeToggle">
        <i id="moonIcon" class="far fa-moon"></i>
        <i id="sunIcon" class="far fa-sun" style="display:none;"></i>
    </button>

    <div class="container" id="mainView">
        <div id="bookDetails"></div>
        <div class="chapter-list" id="chapterList"></div>
    </div>

    <div id="readerView">
        <div class="reader-content">
            <button class="back-btn" onclick="closeReader()"><i class="far fa-arrow-left"></i> Kitaba Dön</button>
            <h2 id="readerTitle" style="font-size: 2.2rem; margin-bottom: 2rem"></h2>
            <div id="readerBody"></div>
        </div>
    </div>

    <div class="modal-overlay" id="commentOverlay" onclick="closeComments()"></div>
    <div class="comment-modal" id="commentModal">
        <div class="modal-drag-handle"></div>
        <h3 style="margin-bottom: 1rem">Yorumlar</h3>
        <div class="comment-form">
            <input type="text" id="usernameInput" placeholder="Kullanıcı adınız..." class="username-input">
            <div class="input-row">
                <input type="text" id="commentInput" placeholder="Yorumunuzu yazın..." class="comment-input">
                <button class="send-btn" onclick="addComment()"><i class="far fa-paper-plane"></i></button>
            </div>
        </div>
        <div class="comment-list" id="commentList"></div>
    </div>

    <script src="kitap_data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const book = kitaplarVerisi[0];
            const mainView = document.getElementById('mainView');
            const readerView = document.getElementById('readerView');
            const themeToggle = document.getElementById('themeToggle');
            const moonIcon = document.getElementById('moonIcon');
            const sunIcon = document.getElementById('sunIcon');
            const usernameInput = document.getElementById('usernameInput');
            
            let currentChapterIndex = null;
            let currentParagraphIndex = null;

            // Load saved username
            usernameInput.value = localStorage.getItem('lastUsername') || '';

            // Theme Management
            const setTheme = (theme) => {
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                if (theme === 'dark') {
                    moonIcon.style.display = 'none';
                    sunIcon.style.display = 'block';
                } else {
                    moonIcon.style.display = 'block';
                    sunIcon.style.display = 'none';
                }
            };

            const savedTheme = localStorage.getItem('theme') || 'light';
            setTheme(savedTheme);

            themeToggle.onclick = () => {
                const current = document.body.getAttribute('data-theme');
                setTheme(current === 'light' ? 'dark' : 'light');
            };

            // Render Hero
            document.getElementById('bookDetails').innerHTML = `
                <div class="book-hero">
                    <img src="${book.cover}" class="cover-image" alt="${book.title}">
                    <h1>${book.title}</h1>
                    <p class="author">${book.author}</p>
                    <p class="description">${book.description}</p>
                </div>
            `;

            // Render Chapters
            document.getElementById('chapterList').innerHTML = book.chapters.map((chapter, index) => `
                <div class="chapter-item" onclick="openChapter(${index})">
                    <span class="chapter-title">${chapter.title}</span>
                    <span class="arrow"><i class="far fa-chevron-right"></i></span>
                </div>
            `).join('');

            window.openChapter = async (index) => {
                currentChapterIndex = index;
                const chapter = book.chapters[index];
                document.getElementById('readerTitle').innerText = chapter.title;
                document.getElementById('readerBody').innerHTML = '<p style="text-align:center">Yükleniyor...</p>';
                
                try {
                    const response = await fetch(chapter.src);
                    const mdText = await response.text();
                    
                    // Convert MD to HTML segments (by paragraph for comments)
                    // Simple approximation: split by double newlines for paragraphs
                    const paragraphs = mdText.split(/\n\s*\n/).filter(p => p.trim() !== '');
                    
                    const html = paragraphs.map((p, pIdx) => {
                        const rendered = marked.parse(p);
                        return `
                            <div class="paragraph-container" id="p-${pIdx}">
                                <div class="paragraph-text">${rendered}</div>
                                <button class="comment-trigger" onclick="openComments(${pIdx})">
                                    <i class="far fa-comment-lines"></i>
                                </button>
                            </div>
                        `;
                    }).join('');
                    
                    document.getElementById('readerBody').innerHTML = html;
                } catch (error) {
                    document.getElementById('readerBody').innerHTML = `<p style="color:red">Bölüm yüklenemedi: ${error.message}</p>`;
                }
                
                readerView.classList.add('active');
                mainView.style.display = 'none';
                window.scrollTo(0, 0);
            };

            window.closeReader = () => {
                readerView.classList.remove('active');
                mainView.style.display = 'block';
            };

            // Comment Management
            window.openComments = (pIdx) => {
                currentParagraphIndex = pIdx;
                document.getElementById('commentModal').classList.add('active');
                document.getElementById('commentOverlay').classList.add('active');
                renderComments();
            };

            window.closeComments = () => {
                document.getElementById('commentModal').classList.remove('active');
                document.getElementById('commentOverlay').classList.remove('active');
            };

            const renderComments = () => {
                const key = `comments-${book.id}-${currentChapterIndex}-${currentParagraphIndex}`;
                const comments = JSON.parse(localStorage.getItem(key) || '[]');
                const list = document.getElementById('commentList');
                
                if (comments.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: var(--secondary-text); margin-top: 2rem;">Henüz yorum yok. İlk yorumu sen yap!</p>';
                } else {
                    list.innerHTML = comments.map(c => `
                        <div class="comment-item">
                            <span class="comment-author">${c.author}</span>
                            <p class="comment-text">${c.text}</p>
                        </div>
                    `).reverse().join('');
                }
            };

            window.addComment = () => {
                const username = usernameInput.value.trim() || 'Misafir';
                const input = document.getElementById('commentInput');
                const text = input.value.trim();
                
                if (!text) return;

                // Save username
                localStorage.setItem('lastUsername', username);

                const key = `comments-${book.id}-${currentChapterIndex}-${currentParagraphIndex}`;
                const comments = JSON.parse(localStorage.getItem(key) || '[]');
                
                comments.push({
                    author: username,
                    text: text,
                    date: new Date().toISOString()
                });

                localStorage.setItem(key, JSON.stringify(comments));
                input.value = '';
                renderComments();
            };
        });
    </script>
</body>
</html></html>
