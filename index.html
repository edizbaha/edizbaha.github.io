<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıp - Ediz Baha</title>
    <!-- Modern Sans-Serif Fontlar -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Pro -->
    <link rel="stylesheet" href="https://cdn.cache.lol/type/fontawesome-pro/css/all.css">
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111827;
            --secondary-text: #6b7280;
            --pill-bg: #f5f5f5;
            --border-color: #f0f0f0;
            --accent-glow: rgba(255, 230, 209, 0.4);
            --card-bg: #ffffff;
            --reader-bg: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --secondary-text: #94a3b8;
            --pill-bg: #1e293b;
            --border-color: #1e293b;
            --accent-glow: rgba(255, 230, 209, 0.1);
            --card-bg: #1e293b;
            --reader-bg: #0f172a;
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: radial-gradient(ellipse at top, var(--accent-glow) 0%, transparent 70%);
            background-attachment: fixed;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 6rem 1.5rem 5rem;
            animation: fadeIn 0.8s ease;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--pill-bg);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: var(--text-color);
            transition: var(--transition);
            font-size: 1.2rem;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .book-hero {
            display: flex;
            align-items: center;
            gap: 3rem;
            text-align: left;
            margin-bottom: 4rem;
        }

        .hero-content {
            flex-grow: 1;
        }

        .cover-image {
            width: 220px;
            height: 320px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transition: transform 0.5s ease;
            flex-shrink: 0;
            display: block;
        }

        .cover-image:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 2rem 0;
            letter-spacing: -1px;
        }

        .stats-row {
            display: flex;
            align-items: center;
            gap: 0;
            margin-top: 2rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            padding: 0 1.5rem;
            border-right: 1px solid var(--border-color);
        }

        .stat-item:first-child { padding-left: 0; }
        .stat-item:last-child { border-right: none; }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--secondary-text);
            font-weight: 500;
        }

        .stat-value {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--text-color);
        }

        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .chapter-item {
            padding: 1.25rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .chapter-item:hover {
            border-color: var(--secondary-text);
            transform: translateX(4px);
        }

        .chapter-title {
            font-weight: 500;
            font-size: 1.1rem;
        }

        .arrow {
            color: var(--secondary-text);
            font-size: 1rem;
        }

        /* Reader View */
        #readerView {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--reader-bg);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 2rem 1.5rem;
        }

        #readerView.active {
            display: flex;
        }

        .reader-content {
            max-width: 650px;
            width: 100%;
        }

        .back-btn {
            background: var(--pill-bg);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 3rem;
            font-weight: 500;
            color: var(--text-color);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            opacity: 0.8;
        }

        .reader-body {
            font-size: 1.15rem;
            line-height: 1.9;
            color: var(--text-color);
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .reader-body p {
            margin-bottom: 1.5rem;
        }

        .reader-footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
        }

        .next-btn {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 14px 28px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container { padding-top: 5rem; }
            
            .book-hero {
                flex-direction: column;
                text-align: center;
                gap: 2rem;
            }

            .cover-image {
                margin: 0 auto;
                width: 180px;
                height: 260px;
            }

            h1 { 
                font-size: 2.2rem; 
                margin-bottom: 1.5rem;
            }

            .stats-row {
                justify-content: center;
            }

            .stat-item {
                padding: 0 1rem;
            }

            #readerView {
                padding: 1.5rem 1rem;
            }

            .back-btn {
                margin-bottom: 2rem;
                padding: 8px 16px;
                font-size: 0.9rem;
            }

            #readerTitle {
                font-size: 1.8rem !important;
                margin-bottom: 1.5rem !important;
            }

            .reader-body {
                font-size: 1.1rem;
                line-height: 1.8;
            }

            .next-btn {
                width: 100%;
                justify-content: center;
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body data-theme="light">

    <button class="theme-toggle" id="themeToggle">
        <i id="moonIcon" class="far fa-moon"></i>
        <i id="sunIcon" class="far fa-sun" style="display:none;"></i>
    </button>

    <div class="container" id="mainView">
        <div id="bookDetails"></div>
        <div class="chapter-list" id="chapterList"></div>
    </div>

    <div id="readerView">
        <div class="reader-content">
            <button class="back-btn" onclick="closeReader()"><i class="far fa-arrow-left"></i> Kitaba Dön</button>
            <h2 id="readerTitle" style="font-size: 2.2rem; margin-bottom: 2rem"></h2>
            <div id="readerBody" class="reader-body"></div>
            <div id="readerFooter" class="reader-footer" style="display: none;"></div>
        </div>
    </div>

    <script src="kitap_data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const book = kitaplarVerisi[0];
            const mainView = document.getElementById('mainView');
            const readerView = document.getElementById('readerView');
            const themeToggle = document.getElementById('themeToggle');
            const moonIcon = document.getElementById('moonIcon');
            const sunIcon = document.getElementById('sunIcon');
            
            let currentChapterIndex = null;

            // Theme Management
            const setTheme = (theme) => {
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                if (theme === 'dark') {
                    moonIcon.style.display = 'none';
                    sunIcon.style.display = 'block';
                } else {
                    moonIcon.style.display = 'block';
                    sunIcon.style.display = 'none';
                }
            };

            const savedTheme = localStorage.getItem('theme') || 'light';
            setTheme(savedTheme);

            themeToggle.onclick = () => {
                const current = document.body.getAttribute('data-theme');
                setTheme(current === 'light' ? 'dark' : 'light');
            };

            // Reads Counter Logic
            let reads = parseInt(localStorage.getItem(`reads-${book.id}`) || "0");
            reads++;
            localStorage.setItem(`reads-${book.id}`, reads);

            // Render Hero
            document.getElementById('bookDetails').innerHTML = `
                <div class="book-hero">
                    <img src="${book.cover}" class="cover-image" alt="${book.title}">
                    <div class="hero-content">
                        <h1>${book.title}</h1>
                        <div class="stats-row">
                            <div class="stat-item">
                                <span class="stat-label"><i class="far fa-eye"></i> OKUNANLAR</span>
                                <span class="stat-value">${reads}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label"><i class="far fa-list-ul"></i> Bölümler</span>
                                <span id="chapterCount" class="stat-value">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Chapter Auto-Discovery Logic
            const discoveredChapters = [];
            const renderChapters = async () => {
                const list = document.getElementById('chapterList');
                const chapterCountEl = document.getElementById('chapterCount');
                let index = 1;
                let searching = true;

                while (searching) {
                    const src = `chapters/bolum${index}.md`;
                    try {
                        const response = await fetch(src);
                        if (!response.ok) {
                            searching = false;
                            break;
                        }
                        
                        const text = await response.text();
                        const titleMatch = text.match(/^#\s+(.+)/m);
                        const title = titleMatch ? titleMatch[1] : `Bölüm ${index}`;
                        
                        const chapterObj = { src, title, content: text };
                        discoveredChapters.push(chapterObj);

                        // Render immediately
                        const item = document.createElement('div');
                        item.className = 'chapter-item';
                        item.onclick = (idx => () => openChapter(idx))(discoveredChapters.length - 1);
                        item.innerHTML = `
                            <span class="chapter-title">${title}</span>
                            <span class="arrow"><i class="far fa-chevron-right"></i></span>
                        `;
                        list.appendChild(item);
                        
                        // Update stats
                        chapterCountEl.innerText = discoveredChapters.length;
                        
                        index++;
                    } catch (e) {
                        searching = false;
                    }
                }

                // Restore saved chapter after discovery
                const savedChapter = localStorage.getItem(`activeChapter-${book.id}`);
                if (savedChapter !== null) {
                    const idx = parseInt(savedChapter);
                    if (idx < discoveredChapters.length) {
                        openChapter(idx, false); // false = don't scroll to top immediately if restoring
                    }
                }
            };

            renderChapters();

            window.openChapter = async (index, scroll = true) => {
                currentChapterIndex = index;
                localStorage.setItem(`activeChapter-${book.id}`, index);
                
                const chapter = discoveredChapters[index];
                document.getElementById('readerTitle').innerText = chapter.title;
                document.getElementById('readerBody').innerHTML = '<p style="text-align:center">Yükleniyor...</p>';
                document.getElementById('readerFooter').style.display = 'none';
                
                try {
                    const mdText = chapter.content;
                    const contentWithoutTitle = mdText.replace(/^#\s+.+/, '').trim();
                    document.getElementById('readerBody').innerHTML = marked.parse(contentWithoutTitle);

                    // Show Next Button if available
                    const footer = document.getElementById('readerFooter');
                    if (index < discoveredChapters.length - 1) {
                        const nextChapter = discoveredChapters[index + 1];
                        footer.innerHTML = `
                            <button class="next-btn" onclick="openChapter(${index + 1})">
                                Sonraki Bölüm: ${nextChapter.title} <i class="far fa-arrow-right"></i>
                            </button>
                        `;
                        footer.style.display = 'flex';
                    } else {
                        footer.style.display = 'none';
                    }
                } catch (error) {
                    document.getElementById('readerBody').innerHTML = `
                        <div style="text-align:center; padding: 2rem; color: var(--secondary-text)">
                            <i class="far fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 1rem; display: block"></i>
                            <p><strong>Bölüm yüklenemedi.</strong></p>
                        </div>
                    `;
                }
                
                readerView.classList.add('active');
                mainView.style.display = 'none';
                if (scroll) window.scrollTo(0, 0);
            };

            window.closeReader = () => {
                localStorage.removeItem(`activeChapter-${book.id}`);
                readerView.classList.remove('active');
                mainView.style.display = 'block';
                window.scrollTo(0, 0);
            };

            // Copy Protection
            readerView.addEventListener('contextmenu', e => e.preventDefault());
            readerView.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'u' || e.key === 's')) {
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html></html>
